<!DOCTYPE html>
<html lang="en">
<!--head 设置编码格式，css和javascript文件 -->
<head>
    <meta charset="UTF-8">
    <title>标签上显示的文字</title>
    <link rel="stylesheet" type="text/css" href="css/main.css">
    <script type="text/javascript" src="js/external/jquery/jquery.js"></script>
    <script type="text/javascript">
        $(function () {
            $('.btn-2').css({fontSize: "30px", color: "red"});
            // 设置属性
            $('.btn-3').attr({id: "btn-003"});
            // 获取属性
            var t = $('.btn-3').attr('id');
            // alert(t)

            $('.btn-3').click(function () {
                // 内部的this指的是原生对象
                // 使用jquery对象用 $(this)
                alert('click 3')
            })

            // jquery系统事件
            $('.btn-2').mouseleave(function () {
                // 内部的this指的是原生对象
                // 使用jquery对象用 $(this)
                // 相当于self
                alert($(this).html());
            })

            // bind系统事件
            $('.btn-1').bind('click mouseleave', function (event) {
                alert($(this).html());
                // 取消绑定
                // $(this).unbind();
                $(this).unbind('mouseleave');
            });

            // 自定义hello事件, 用trigger触发
            $('.btn-4').bind('hello', function () {
                alert('自定义 hello')
            })
            $('.btn-4').trigger('hello')

            // 事件冒泡
        });

    </script>
</head>
<body>
<button type="button" class="btn-1">按钮</button>
<button type="button" class="btn-2">按钮</button>
<button type="button" class="btn-3">按钮</button>
<button type="button" class="btn-4">自定义hello事件, 用trigger触发</button>
</body>
