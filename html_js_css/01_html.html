<!DOCTYPE html>
<html lang="en">
<!--head 设置编码格式，css和javascript文件 -->
<head>
    <meta charset="UTF-8">
    <title>标签上显示的文字</title>
</head>
<body>
<h1>这是一级标题</h1>
<h2>这是二级标题</h2>
<h3>这是三级标题</h3>

<!--段落中输入多个空格渲染只显示一个, 使用&nbsp; -->
<!--段落换行符<br /> -->
<p>&nbsp;&nbsp;段落前面空格需要使用符号，<br/>换行需要使用换行符号。</p>


<!--
href超链接地址
title鼠标悬停时提示文字框
target="_self" 缺省值，新页面替换原来的页面，在原来位置打开
target="_blank" 新页面会在新开的一个浏览器窗口打开 -->
<a href="http://www.itcast.cn/" title="跳转的传智播客网站" target="_blank">定义超链接,传智播客</a>

<div>需要转义才能显示 &lt; 和 &gt;</div>

<!--src图片地址 alt加在失败显示的文字 -->
<img src="images/pic.jpg" alt="产品图片"/>

<ol>
    <li>有序列表</li>
</ol>

<ul>
    <li>无序列表</li>
</ul>


<!--action地址 method请求方式-->
<form action="http://www..." method="get">
    <label>姓名：</label><input type="text" name="username"/>
    <label>密码：</label><input type="password" name="password"/>
    <label>性别：</label>
    <input type="radio" name="gender" value="0"/> 男
    <input type="radio" name="gender" value="1"/> 女
    <label>爱好：</label>
    <input type="checkbox" name="like" value="sing"/> 唱歌
    <input type="checkbox" name="like" value="run"/> 跑步
    <input type="checkbox" name="like" value="swiming"/> 游泳
    <label>照片：</label>
    <input type="file" name="person_pic">
    <label>个人描述：</label>
    <textarea name="about"></textarea>
    <label>籍贯：</label>
    <select name="site">
        <option value="0">北京</option>
        <option value="1">上海</option>
        <option value="2">广州</option>
        <option value="3">深圳</option>
    </select>
    <input type="submit" name="" value="提交">
    <!-- input类型为submit定义提交按钮
         还可以用图片控件代替submit按钮提交，一般会导致提交两次，不建议使用。如：
         <input type="image" src="xxx.gif">
    -->
    <input type="reset" name="" value="重置">
</form>

<!--
table常用标签
1、table声明一个表格
2、tr表格中的一行
3、td代表普通单元格，th表示表头单元格

table常用属性：
1、border 		边框
2、cellpadding 	内容与边框距离
3、cellspacing 	单元格与单元格间的距离
4、align 		水平对齐left | center | right
5、valign 		垂直对齐top  | middle | bottom
6、colspan 		水平合并
7、rowspan 		垂直合并-->
<table border="5" width="500" height="200" cellpadding="30" cellspacing="20">
    <tr>
        <th colspan="2">111</th>
        <th rowspan="2">222</th>
        <th align="left">333</th>
        <th valign="top">444</th>
        <th>555</th>
    </tr>
    <tr>
        <th>111</th>
        <th>222</th>
        <th>333</th>
        <th>444</th>
        <th>555</th>
    </tr>
    <tr>
        <th>111</th>
        <th>222</th>
        <th>333</th>
        <th>444</th>
        <th>555</th>
        <th>666</th>
    </tr>
    <!--设置css选择器-->
    <style type="text/css">
        div {
            color: red !important;
        }
    </style>
    <div style="color:blue">这是一个div元素</div>
</table>
</body>
</html>
